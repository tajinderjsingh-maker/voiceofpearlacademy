<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Newsletter Experience</title>

<style>
*{box-sizing:border-box}
body{margin:0;font-family:Arial;background:#020617;color:#fff;overflow:hidden}

body::before{content:"";position:fixed;inset:0;z-index:0;
background:
radial-gradient(circle at 20% 30%, rgba(239,68,68,0.25), transparent 40%),
radial-gradient(circle at 80% 70%, rgba(59,130,246,0.25), transparent 40%);
animation:bgMove 25s linear infinite}
@keyframes bgMove{0%{transform:translate(0,0)}50%{transform:translate(-5%,5%)}100%{transform:translate(0,0)}}

.logoWrap{position:fixed;top:6px;left:50%;transform:translateX(-50%);z-index:5;text-align:center}
.logo{width:min(49vw,294px)}
.tagline{margin-top:8px;font-size:12px;opacity:.7}

.audioBtn{position:fixed;top:12px;right:16px;z-index:10;cursor:pointer;font-size:18px;opacity:.8}

.stage{height:100vh;display:flex;align-items:center;justify-content:center;perspective:1200px;position:relative;z-index:2}

.carousel{position:relative;width:100%;height:min(70vh,420px);overflow:hidden;touch-action:pan-y;cursor:grab}

.card{position:absolute;left:50%;top:50%;width:clamp(180px,70vw,252px);aspect-ratio:252/370;border-radius:14px;overflow:hidden;border:1px solid rgba(255,255,255,0.25);background:#000;transform:translate(-50%,-50%);will-change:transform,opacity;}
.card img,.card video{width:100%;height:100%;object-fit:cover;pointer-events:none}

.hint{position:absolute;bottom:80px;font-size:14px;opacity:.8;display:flex;align-items:center;gap:8px}

.arrow{
 display:inline-block;
 opacity:.7;
}

.arrow.left{
 animation:arrowLeft 1.2s infinite ease-in-out;
}

.arrow.right{
 animation:arrowRight 1.2s infinite ease-in-out;
}

@keyframes arrowLeft{
 0%{transform:translateX(0);opacity:.3}
 50%{transform:translateX(-8px);opacity:1}
 100%{transform:translateX(0);opacity:.3}
}

@keyframes arrowRight{
 0%{transform:translateX(0);opacity:.3}
 50%{transform:translateX(8px);opacity:1}
 100%{transform:translateX(0);opacity:.3}
}
/* removed delay for perfect mirrored sync */

@keyframes arrowMove{
 0%{transform:translateX(0);opacity:.3}
 50%{transform:translateX(6px);opacity:1}
 100%{transform:translateX(0);opacity:.3}
}
</style>
</head>
<body>

<div class="logoWrap">
<img src="logo.png" class="logo">
<div class="tagline">Celebrating 100 weeks</div>
</div>

<div class="audioBtn" id="audioBtn">🔊</div>
<audio id="bgAudio" src="audio.mp3" loop></audio>

<div class="stage">
<div class="carousel" id="carousel"></div>
<div class="hint">
 <span class="arrow left">←</span>
 <span>Swipe</span>
 <span class="arrow right">→</span>
</div>
</div>

<script>
const TOTAL=89

const data = Array.from({length:TOTAL},(_,i)=>{
 if(i===20) return {type:'video',src:'slide20.mp4'}
 if(i===35) return {type:'video',src:'cancerday.mp4'}
 if(i===84) return {type:'video',src:'video86.mp4'}
 if(i===88) return {type:'video',src:'FDCI.mp4'}
 if(i<=87) return {type:'image',src:`images/slide${i}.webp`}
 return null
})

const carousel=document.getElementById('carousel')
let index=0
let target=0
let last=-1
let dragging=false

function createCard(item){
 const el=document.createElement('div')
 el.className='card'

 if(item.type==='video'){
  const v=document.createElement('video')
  v.src=item.src
  v.muted=true
  v.loop=true
  v.autoplay=true
  v.playsInline=true
  v.preload='auto'
  v.onloadeddata=()=>v.play().catch(()=>{})
  el.appendChild(v)
 }else{
  const img=document.createElement('img')
  img.src=item.src
  el.appendChild(img)
 }
 return el
}

function render(){
 const current=Math.floor(index)
 if(current===last && Math.abs(index-current)<0.001) return
 last=current

 carousel.innerHTML=''

 for(let i=current-3;i<=current+3;i++){
  if(!data[i]) continue
  const card=createCard(data[i])

  const offset = i - index
  const abs = Math.abs(offset)

  const x = offset * 90
  const scale = 1 - Math.min(abs*0.1,0.25)
  const rotateY = -offset * 15
  const rotateX = Math.min(Math.max((target-index)*6,-6),6)
  const opacity = abs>3 ? 0 : 1 - abs*0.25

  const rotateZ = offset * 2
  card.style.transform = `translate(calc(-50% + ${x}px), -50%) scale(${scale}) rotateY(${rotateY}deg) rotateX(${rotateX}deg) rotateZ(${rotateZ}deg)`
  card.style.opacity = opacity

  // enhanced shadow for depth & overlap feel
  const shadowIntensity = 20 + (1 - abs) * 40
  card.style.boxShadow = `0 ${shadowIntensity}px ${shadowIntensity*2}px rgba(0,0,0,0.6)`
  card.style.zIndex = 10 - Math.round(abs*3)

  carousel.appendChild(card)
 }
}

function animate(){
 const diff = target - index
 index += diff * 0.09
 if(Math.abs(diff) < 0.001) index = target
 render()
 requestAnimationFrame(animate)
}
animate()

// AUTO PLAY WITH VIDEO AWARE TIMING
let autoTimer=null

function scheduleNext(){
 clearTimeout(autoTimer)

 const current=Math.round(target)
 const item=data[current]

 if(item && item.type==='video'){
   // wait for video duration
   const tempVideo=document.createElement('video')
   tempVideo.src=item.src
   tempVideo.preload='metadata'

   tempVideo.onloadedmetadata=()=>{
     const duration = (tempVideo.duration || 3) * 1000
     autoTimer=setTimeout(()=>{
       if(!dragging) target=(target+1)%TOTAL
       scheduleNext()
     }, duration)
   }

   tempVideo.onerror=()=>{
     // fallback if video fails
     autoTimer=setTimeout(()=>{
       if(!dragging) target=(target+1)%TOTAL
       scheduleNext()
     },1800)
   }

 }else{
   autoTimer=setTimeout(()=>{
     if(!dragging) target=(target+1)%TOTAL
     scheduleNext()
   },1800)
 }
}

scheduleNext()

let startX=0
let lastX=0
let velocity=0

carousel.addEventListener('pointerdown',e=>{
 dragging=true
 startX=e.clientX
 lastX=e.clientX
 carousel.style.cursor='grabbing'
})

window.addEventListener('pointermove',e=>{
 if(!dragging) return
 const dx=e.clientX-lastX
 velocity=dx
 target -= dx*0.01
 lastX=e.clientX
 target=Math.max(0,Math.min(TOTAL-1,target))
})

window.addEventListener('pointerup',()=>{
 if(!dragging) return
 dragging=false
 carousel.style.cursor='grab'

 // momentum
 target -= velocity*0.05
 target=Math.max(0,Math.min(TOTAL-1,target))

 scheduleNext()
})

const audio=document.getElementById('bgAudio')
const btn=document.getElementById('audioBtn')

function playAudio(){
 // try autoplay with sound (may fail silently depending on browser)
 audio.muted = false
 audio.play().catch(()=>{
   // fallback: start muted then unmute on interaction
   audio.muted = true
   audio.play().then(()=>{
     document.addEventListener('click',()=>{
       audio.muted = false
     },{once:true})
   }).catch(()=>{})
 })
}

window.addEventListener('load',playAudio)
document.addEventListener('click',playAudio,{once:true})

btn.onclick=()=>{
 if(audio.paused){audio.play();btn.innerText='🔊'}
 else{audio.pause();btn.innerText='🔇'}
}

console.assert(data.length===89,'Total slides incorrect')
console.assert(data[20].type==='video','Slide 20 should be video')
console.assert(data[88].type==='video','Slide 88 should be video')
</script>

</body>
</html>
