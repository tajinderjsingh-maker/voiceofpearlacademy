<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Newsletter Experience</title>

<style>
*{box-sizing:border-box}
body{margin:0;font-family:Arial;background:#020617;color:#fff;overflow:hidden}

body::before{content:"";position:fixed;inset:0;z-index:0;
background:
radial-gradient(circle at 20% 30%, rgba(239,68,68,0.15), transparent 40%),
radial-gradient(circle at 80% 70%, rgba(59,130,246,0.15), transparent 40%);
animation:bgMove 40s linear infinite}
@keyframes bgMove{0%{transform:translate(0,0)}50%{transform:translate(-2%,2%)}100%{transform:translate(0,0)}}

.logoWrap{position:fixed;top:22px;left:50%;transform:translateX(-50%);z-index:5;text-align:center}
.logo{width:min(49vw,294px)}
.tagline{margin-top:8px;font-size:12px;opacity:.85}

.stage{height:100vh;display:flex;align-items:center;justify-content:center;perspective:1200px;position:relative;z-index:2}
.carousel{position:relative;width:100%;height:min(70vh,420px);overflow:hidden;touch-action:none}

.card{position:absolute;left:50%;top:50%;width:clamp(180px,70vw,252px);aspect-ratio:252/370;border-radius:14px;overflow:hidden;background:#000;border:1px solid rgba(255,255,255,0.2);}
.card img,.card video{width:100%;height:100%;object-fit:cover}

.hint{position:absolute;bottom:80px;font-size:14px;opacity:.85;display:flex;gap:8px}
</style>
</head>
<body>

<div class="logoWrap">
<img src="logo.png" class="logo">
<div class="tagline">Celebrating 100 weeks</div>
</div>

<div class="stage">
<div class="carousel" id="carousel"></div>
<div class="hint">← Swipe →</div>
</div>

<script>
const TOTAL=89

const data = Array.from({length:TOTAL},(_,i)=>{
 if(i===20) return {type:'video',src:'slide20.mp4'}
 if(i===35) return {type:'video',src:'cancerday.mp4'}
 if(i===84) return {type:'video',src:'video86.mp4'}
 if(i===88) return {type:'video',src:'FDCI.mp4'}
 return {type:'image',src:`images/slide${i}.webp`}
})

const carousel=document.getElementById('carousel')
let index=0,target=0,dragging=false

// create fixed pool (NO re-creation = no flicker)
const VISIBLE=7
const cards=[]

for(let i=0;i<VISIBLE;i++){
 const el=document.createElement('div')
 el.className='card'
 carousel.appendChild(el)
 cards.push({el, dataIndex:null, media:null})
}

function setContent(card,item,isCenter){
 if(card.dataIndex===item.src) return
 card.el.innerHTML=''

 if(item.type==='video'){
  const v=document.createElement('video')
  v.src=item.src
  v.muted=true
  v.loop=true
  v.playsInline=true
  if(isCenter){
   v.autoplay=true
   v.play().catch(()=>{})
  }
  card.el.appendChild(v)
  card.media=v
 }else{
  const img=document.createElement('img')
  img.src=item.src
  card.el.appendChild(img)
  card.media=img
 }
 card.dataIndex=item.src
}

function render(){
 const base=Math.floor(index)

 for(let s=0;s<VISIBLE;s++){
  const i=base + s - Math.floor(VISIBLE/2)
  const card=cards[s]
  const item=data[i]
  if(!item) continue

  const offset=i-index
  const abs=Math.abs(offset)

  setContent(card,item,abs<0.5)

  // pause non-center videos
  if(card.media && card.media.tagName==='VIDEO'){
    if(abs<0.5){card.media.play().catch(()=>{})}
    else{card.media.pause()}
  }

  const x=offset*90
  const scale=1-Math.min(Math.pow(abs,1.2)*0.12,0.3)
  const rotateY=-offset*15

  card.el.style.transform=`translate(calc(-50% + ${x}px), -50%) scale(${scale}) rotateY(${rotateY}deg)`
  card.el.style.zIndex=20-Math.round(abs*5)
  card.el.style.opacity=abs<0.5?1:0.8
 }
}

function animate(){
 index+=(target-index)*0.07
 render()
 requestAnimationFrame(animate)
}
animate()

// autoplay simple (stable)
setInterval(()=>{
 if(!dragging) target=(target+1)%TOTAL
},2000)

// pointer smooth
let lastX=0
carousel.addEventListener('pointerdown',e=>{
 dragging=true
 lastX=e.clientX
 carousel.setPointerCapture(e.pointerId)
})

window.addEventListener('pointermove',e=>{
 if(!dragging) return
 const dx=e.clientX-lastX
 target-=dx*0.005
 lastX=e.clientX
})

window.addEventListener('pointerup',e=>{
 dragging=false
 try{carousel.releasePointerCapture(e.pointerId)}catch{}
})

console.assert(data.length===89)
</script>

</body>
</html>
