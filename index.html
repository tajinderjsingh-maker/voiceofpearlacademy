<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Newsletter Experience</title>

<style>
*{box-sizing:border-box}
body{margin:0;font-family:Arial;background:#020617;color:#fff;overflow-x:hidden}

body::before{content:"";position:fixed;inset:0;z-index:0;
background:
radial-gradient(circle at 20% 30%, rgba(239,68,68,0.25), transparent 40%),
radial-gradient(circle at 80% 70%, rgba(59,130,246,0.25), transparent 40%);
animation:bgMove 25s linear infinite}
@keyframes bgMove{0%{transform:translate(0,0)}50%{transform:translate(-5%,5%)}100%{transform:translate(0,0)}}

.logoWrap{position:fixed;top:4px;left:50%;transform:translateX(-50%);display:flex;flex-direction:column;align-items:center;z-index:5}
.logo{width:min(49vw,294px)}
.tagline{margin-top:22px;font-size:12px;opacity:.7}

.stage{height:100vh;display:flex;align-items:center;justify-content:center;perspective:1200px;position:relative;z-index:2}

.carousel{position:relative;width:100%;height:min(70vh,420px);overflow:hidden;touch-action:none}

.card{position:absolute;width:clamp(180px,70vw,252px);aspect-ratio:252/370;border-radius:14px;overflow:hidden;transition:.4s ease;border:1px solid rgba(255,255,255,0.25);background:#000}
.card img,.card video{width:100%;height:100%;object-fit:cover;pointer-events:none}

.center{transform:translateX(0) scale(1);z-index:3}
.left{transform:translateX(-120px) scale(.9) rotateY(10deg);z-index:2;opacity:.7}
.right{transform:translateX(120px) scale(.9) rotateY(-10deg);z-index:2;opacity:.7}
.hiddenL{transform:translateX(-300px) scale(.8);opacity:0}
.hiddenR{transform:translateX(300px) scale(.8);opacity:0}

.hint{position:absolute;bottom:56px;font-size:14px;opacity:.6}
.nav{position:absolute;top:50%;transform:translateY(-50%);font-size:28px;opacity:.4;cursor:pointer}
.leftNav{left:20px}
.rightNav{right:20px}
</style>
</head>
<body>

<div class="logoWrap">
<img src="logo.png" class="logo">
<div class="tagline">Celebrating 100 weeks</div>
</div>

<div class="stage">
<div class="carousel" id="carousel"></div>
<div class="hint">← Swipe →</div>
<div class="nav leftNav">‹</div>
<div class="nav rightNav">›</div>
</div>

<script>
const TOTAL=89

// ⚠️ FIXED PATHS (IMPORTANT)
const data=Array.from({length:TOTAL},(_,i)=>{
 if(i===44) return {type:'video',src:'videos/cancerday.mp4'}
 if(i===86) return {type:'video',src:'videos/video86.mp4'}
 if(i===87) return {type:'video',src:'videos/FDCI.mp4'}
 if(i===88) return {type:'video',src:'videos/video88.mp4'}
 return {type:'image',src:`images/slide${i}.webp`}
})

const carousel=document.getElementById('carousel')
let index=0
let targetIndex=0
let last=-1
let dragging=false

function createCard(item){
 const el=document.createElement('div')
 el.className='card'

 if(item.type==='video'){
  const v=document.createElement('video')
  v.src=item.src
  v.muted=true
  v.autoplay=true
  v.loop=true
  v.playsInline=true
  v.preload='auto'

  v.onloadeddata=()=>v.play().catch(()=>{})

  v.onerror=()=>{
    console.error('❌ Missing video:', item.src)
    el.innerHTML='<div style="display:flex;height:100%;align-items:center;justify-content:center;opacity:.6">Missing video</div>'
  }

  v.style.objectFit='contain'
  el.appendChild(v)
 }else{
  const img=document.createElement('img')
  img.src=item.src
  el.appendChild(img)
 }
 return el
}

function render(){
 const current=Math.round(index)
 if(current===last) return
 last=current

 carousel.innerHTML=''

 for(let i=current-2;i<=current+2;i++){
  if(!data[i]) continue
  const card=createCard(data[i])

  if(i===current) card.classList.add('center')
  else if(i===current-1) card.classList.add('left')
  else if(i===current+1) card.classList.add('right')
  else if(i<current) card.classList.add('hiddenL')
  else card.classList.add('hiddenR')

  carousel.appendChild(card)
 }
}

function animate(){
 index += (targetIndex-index)*0.06
 render()
 requestAnimationFrame(animate)
}
animate()

// autoplay
setInterval(()=>{
 if(dragging) return
 targetIndex=(targetIndex+1)%TOTAL
},2000)

// nav
const leftBtn=document.querySelector('.leftNav')
const rightBtn=document.querySelector('.rightNav')
leftBtn.onclick=()=>targetIndex--
rightBtn.onclick=()=>targetIndex++

// touch FIXED
let startX=0
carousel.addEventListener('touchstart',e=>{
 dragging=true
 startX=e.touches[0].clientX
})

carousel.addEventListener('touchmove',e=>{
 if(!dragging) return
 e.preventDefault()
 const dx=e.touches[0].clientX-startX
 targetIndex-=dx*0.01
 startX=e.touches[0].clientX
},{passive:false})

carousel.addEventListener('touchend',()=>dragging=false)

// TEST CASE (console check)
console.assert(data[44].type==='video','Slide 44 should be video')
console.assert(data[86].type==='video','Slide 86 should be video')
</script>

</body>
</html>
