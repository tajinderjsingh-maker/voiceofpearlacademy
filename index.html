<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Newsletter Experience</title>
<style>
*{box-sizing:border-box}
body{margin:0;font-family:Arial,Helvetica,sans-serif;background:#020617;color:#fff;overflow-x:hidden}

/* BG */
body::before{
content:"";position:fixed;inset:0;z-index:0;
background:
radial-gradient(circle at 20% 30%, rgba(239,68,68,0.25), transparent 40%),
radial-gradient(circle at 80% 70%, rgba(59,130,246,0.25), transparent 40%);
animation:bgMove 25s linear infinite;
}
@keyframes bgMove{0%{transform:translate(0,0)}50%{transform:translate(-5%,5%)}100%{transform:translate(0,0)}}

main{position:relative;z-index:2}

.logo{
position:fixed;top:20px;left:50%;transform:translateX(-50%);
width:min(49vw,294px);z-index:5;
}

.stage{
height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center;perspective:1200px;
}

/* CARD FIXED (no glitch) */
.card3d{
width:252px;height:370px;
position:relative;
transform-style:preserve-3d;
transition:transform .6s cubic-bezier(.25,.8,.25,1);
border:1px solid rgba(255,255,255,0.25);
border-radius:14px;
will-change: transform;
}

/* stable glow */
.card3d::before{
content:"";position:absolute;inset:-14px;border-radius:20px;
background:radial-gradient(circle, rgba(239,68,68,.25), transparent 70%);
filter:blur(25px);z-index:-1;opacity:0.8;
}

.face{
position:absolute;inset:0;border-radius:14px;overflow:hidden;
backface-visibility:hidden;
transform:translateZ(0);
}
.back{transform:rotateY(180deg)}
.face img,.face video{width:100%;height:100%;object-fit:cover}

/* shrink specific video (slide86) */
.face video[src*="video86.mp4"]{
  transform:scale(0.85);
}

.scrollText{margin-top:44px;font-size:14px;opacity:.7}
.divider{width:60px;height:1px;background:#fff;opacity:.3;margin:12px auto}
.arrow{font-size:20px;opacity:.6}

.video-section{
padding:80px 20px;display:flex;flex-direction:column;gap:60px;align-items:center;
}
.video-card{
width:100%;max-width:420px;background:rgba(30,41,59,0.6);
border-radius:16px;padding:16px;display:flex;flex-direction:column;gap:12px;
border:1px solid rgba(255,255,255,0.15);
}
.video-title{text-align:center;opacity:.8}
</style>
</head>
<body>

<img src="logo.png" class="logo">

<main>

<div class="stage">

<div class="card3d" id="card">
<div class="face front" id="front">
<img><video muted loop playsinline style="display:none"></video>
</div>
<div class="face back" id="back">
<img><video muted loop playsinline style="display:none"></video>
</div>
</div>

<div class="scrollText">Scroll Up / Down</div>
<div class="divider"></div>
<div class="arrow">↓</div>

</div>

<div class="video-section" id="videos">

<div class="video-card">
<iframe width="100%" height="220" src="https://www.youtube.com/embed/KHx3EGSJoAs" frameborder="0" allow="accelerometer; encrypted-media; gyroscope; picture-in-picture" allowfullscreen></iframe>
<div class="video-title">School of Complete Professionals | Pearl Academy</div>
</div>

<div class="video-card">
<iframe width="100%" height="220" src="https://www.youtube.com/embed/jF9RMBgBD3M" frameborder="0" allow="accelerometer; encrypted-media; gyroscope; picture-in-picture" allowfullscreen></iframe>
<div class="video-title">Aaj Ki Rani: An Ode to the Women of Today</div>
</div>

</div>

</main>

<script>
const TOTAL = 89
const data = Array.from({length: TOTAL}, (_, i) => {
  if(i === 86) return {type:'video', src:'video86.mp4'}
  if(i === 88) return {type:'video', src:'video88.mp4'}
  return {type:'image', src:`images/slide${i}.webp`}
})

const card = document.getElementById('card')
const front = document.getElementById('front')
const back = document.getElementById('back')

function setFace(el, item){
  const img = el.querySelector('img')
  const vid = el.querySelector('video')

  if(item.type === 'video'){
    img.style.display='none'
    vid.style.display='block'

    if(vid.src !== item.src){
      vid.src = item.src
    }

    vid.play().catch(()=>{})
  } else {
    if(!vid.paused) vid.pause()
    vid.style.display='none'
    img.style.display='block'
    img.src = item.src
  }
}

setFace(front,data[0])
setFace(back,data[1])

let rotation = 0
let currentIndex = -1

function render(){
  card.style.transform = `rotateY(${rotation}deg)`

  const index = Math.floor(rotation / 180)
  if(index === currentIndex) return
  currentIndex = index

  if(index % 2 === 0){
    if(data[index]) setFace(front,data[index])
    if(data[index+1]) setFace(back,data[index+1])
  }else{
    if(data[index]) setFace(back,data[index])
    if(data[index+1]) setFace(front,data[index+1])
  }
}

let reachedEnd = false
let inVideoSection = false

// smooth scroll-based rotation
window.addEventListener('wheel',(e)=>{
  const maxRotation = (TOTAL-1) * 180

  // if in video section, allow scroll back
  if(inVideoSection && e.deltaY < 0){
    inVideoSection = false
    rotation = maxRotation - 1
    render()
    return
  }

  // allow normal scroll ONLY after user fully exits interaction
  if(inVideoSection) return

  e.preventDefault()

  rotation += e.deltaY * 0.6

  if(rotation < 0) rotation = 0

  if(rotation >= maxRotation){
    rotation = maxRotation

    if(!reachedEnd){
      reachedEnd = true
      inVideoSection = true
      document.getElementById('videos').scrollIntoView({behavior:'smooth'})
    }
  } else {
    reachedEnd = false
  }

  render()
},{ passive:false })

// touch support (smooth)
let startY=0
window.addEventListener('touchstart',e=>startY=e.touches[0].clientY)
window.addEventListener('touchmove',e=>{
  const currentY = e.touches[0].clientY
  const delta = startY - currentY

  const maxRotation = (TOTAL-1) * 180

  // allow reverse from video section
  if(inVideoSection && delta < 0){
    inVideoSection = false
    rotation = maxRotation - 1
    render()
    return
  }

  if(inVideoSection) return

  if(rotation < maxRotation){
    e.preventDefault()
  }

  rotation += delta * 1.2
  startY = currentY

  if(rotation < 0) rotation = 0

  if(rotation >= maxRotation){
    rotation = maxRotation

    if(!reachedEnd){
      reachedEnd = true
      inVideoSection = true
      document.getElementById('videos').scrollIntoView({behavior:'smooth'})
    }
  } else {
    reachedEnd = false
  }

  render()
},{ passive:false })

console.assert(data.length===89,'slides issue');
</script>

</body>
</html>
